user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # B.2 — Compressao gzip pra reduzir 1.6MB de bundle
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/xml
    font/otf
    font/ttf
    font/woff
    font/woff2
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

  include /etc/nginx/conf.d/*.conf;
}
