map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- HTTP: apenas ACME challenge + redirect pra HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name hub.xtconect.online;

    # Let's Encrypt renewal webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Tudo o resto redireciona
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: servidor principal ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hub.xtconect.online;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/hub.xtconect.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.xtconect.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Headers de segurança ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Limites de body ---
    client_max_body_size 10m;

    # ================================================
    # /red/  → editor Node-RED (com WebSocket para live edit)
    # ================================================
    location /red/ {
        proxy_pass http://nodered:1880/red/;
        proxy_http_version 1.1;

        # WebSocket upgrade (editor usa socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers padrão
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts longos pro editor
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
    }

    # ================================================
    # /api/  → endpoints HTTP expostos pelo flow
    # ================================================
    location /api/ {
        proxy_pass http://nodered:1880/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # ================================================
    # /grafana/  → dashboard Grafana (com WebSocket live)
    # ================================================
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Grafana Live (server-sent events + websocket para streaming)
    location /grafana/api/live/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================================
    # /  → placeholder enquanto o webapp não é deployado
    # ================================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Health check interno
    location = /_health {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
